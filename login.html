<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Seed Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-image: url('https://image.pollinations.ai/prompt/Organic%20farm%20sunrise%20background?width=1920&height=1080&nologo=true'), linear-gradient(#2e5939, #2e5939);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 0;
        }
        .auth-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }
        [dir="rtl"] .auth-controls { right: auto; left: 20px; }
        
        .auth-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }
        
        .form-control {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 10px;
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--bg-primary);
            border-color: var(--accent-color);
            box-shadow: none;
            color: var(--text-primary);
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
        }
        [dir="rtl"] .password-toggle { right: auto; left: 15px; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 50%;
            text-decoration: none;
            transition: var(--transition);
            font-size: 1.2rem;
        }
        .social-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
            @media (max-width: 576px) {
            .auth-card {
                padding: 30px 20px !important;
                margin: 20px !important;
                width: calc(100% - 40px) !important;
            }
        }
    </style>
</head>
<body>
    <div class="auth-controls">
        <button class="icon-btn" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
        <button class="icon-btn" id="rtl-toggle"><i class="fa-solid fa-language"></i></button>
    </div>

    <div class="auth-card animate-zoom">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none d-inline-flex align-items-center gap-2">
                <i class="fa-solid fa-seedling fs-1" style="color: var(--accent-color);"></i>
                <h3 class="mb-0" style="color: var(--text-primary) !important;">Seed Vault</h3>
            </a>
            <p class="text-muted mt-2">Welcome back to the preservation movement.</p>
        </div>

        <form class="needs-validation" novalidate onsubmit="event.preventDefault();">
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-3 position-relative">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <i class="fa-regular fa-eye password-toggle" id="togglePassword"></i>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted small" for="rememberMe">Remember Me</label>
                </div>
                <a href="#" class="text-accent small text-decoration-underline">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary w-100 py-3 border-0 mb-4">Login to Account</button>
        </form>

        <div class="text-center position-relative mb-4">
            <hr class="text-muted">
            <span class="position-absolute top-50 start-50 translate-middle px-3" style="background: var(--card-bg); color: var(--text-muted); font-size: 0.9rem;">or continue with</span>
        </div>

        <div class="d-flex justify-content-center gap-3 mb-4">
            <a href="#" class="social-btn"><i class="fa-brands fa-google text-danger"></i></a>
            <a href="#" class="social-btn"><i class="fa-brands fa-apple"></i></a>
        </div>

        <p class="text-center text-muted mb-0">Don't have an account? <a href="signup.html" class="text-gold fw-bold">Sign up</a></p>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
            pwd.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>

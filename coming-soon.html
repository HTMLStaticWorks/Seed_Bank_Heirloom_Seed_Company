<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Seed Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-image: url('https://image.pollinations.ai/prompt/Cultivating%20seedlings%20growth%20background?width=1920&height=1080&nologo=true'), linear-gradient(#2e5939, #2e5939);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #fff;
            text-align: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(26, 44, 31, 0.9) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 0;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
            padding: 40px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 0 10px;
            min-width: 120px;
            display: inline-block;
        }
        
        .countdown-num {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--gold-accent);
            line-height: 1;
            margin-bottom: 5px;
        }

        @media (max-width: 767px) {
            .countdown-box { min-width: 80px; padding: 15px 10px; margin: 5px; }
            .countdown-num { font-size: 2rem; }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 15px 25px;
            border-radius: 50px 0 0 50px;
        }
        .btn-subscribe {
            border-radius: 0 50px 50px 0;
            padding: 15px 30px;
        }
        @media (max-width: 575px) {
            .form-control { border-radius: 50px; margin-bottom: 15px; text-align: center; }
            .btn-subscribe { border-radius: 50px; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="content-wrapper reveal" data-anim="zoom">
        <i class="fa-solid fa-seedling text-gold mb-4" style="font-size: 4rem;"></i>
        <h1 class="display-3 fw-bold mb-3">Something Growing Soon</h1>
        <p class="lead mb-5 mx-auto" style="max-width: 600px;">We are currently cultivating a new digital experience. Our rare seed collection will be available for purchase very soon.</p>

        <div class="d-flex justify-content-center flex-wrap mb-5" id="countdown">
            <div class="countdown-box">
                <div class="countdown-num" id="days">00</div>
                <div class="small text-uppercase tracking-wider">Days</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-num" id="hours">00</div>
                <div class="small text-uppercase tracking-wider">Hours</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-num" id="minutes">00</div>
                <div class="small text-uppercase tracking-wider">Minutes</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-num" id="seconds">00</div>
                <div class="small text-uppercase tracking-wider">Seconds</div>
            </div>
        </div>

        <div class="mx-auto" style="max-width: 500px;">
            <p class="mb-3">Be the first to know when we launch and receive 15% off your first order.</p>
            <form class="d-flex flex-column flex-sm-row needs-validation" novalidate onsubmit="event.preventDefault();">
                <input type="email" class="form-control" placeholder="Enter your email address" required>
                <button type="submit" class="btn-primary btn-subscribe border-0">Notify Me</button>
            </form>
        </div>
        
        <div class="mt-5 d-flex justify-content-center gap-3">
            <a href="#" class="text-white opacity-75 text-decoration-none hover-opacity-100 fs-4"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="text-white opacity-75 text-decoration-none hover-opacity-100 fs-4"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" class="text-white opacity-75 text-decoration-none hover-opacity-100 fs-4"><i class="fa-brands fa-twitter"></i></a>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        // Set launch date to 30 days from now for demo
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
<div id="global-footer"></div>
    <script src="assets/js/load-footer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | Seed Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .illustration-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .not-found-number {
            font-size: 15rem;
            font-weight: 900;
            color: var(--bg-accent);
            line-height: 1;
            margin: 0;
            letter-spacing: -10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .illustration-img {
            position: relative;
            z-index: 1;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container text-center py-5">
        <div class="illustration-container reveal" data-anim="zoom">
            <h1 class="not-found-number">404</h1>
            <img src="https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?q=80&w=800&auto=format&fit=crop" class="img-fluid illustration-img skeleton-wrapper skeleton" alt="Lost in the field">
        </div>
        
        <div class="mt-5 reveal" data-anim="fade-up" style="transition-delay: 0.3s;">
            <h2 class="display-5 mb-3">Looks like this seed didn't germinate.</h2>
            <p class="lead text-muted mb-5 mx-auto" style="max-width: 600px;">The page you are looking for might have been moved, deleted, or possibly never existed in our vault.</p>
            
            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="index.html" class="btn-primary"><i class="fa-solid fa-house me-2"></i> Back Home</a>
                <a href="services.html" class="btn-outline"><i class="fa-solid fa-seedling me-2"></i> Browse Seeds</a>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
<div id="global-footer"></div>
    <script src="assets/js/load-footer.js"></script>
</body>
</html>
